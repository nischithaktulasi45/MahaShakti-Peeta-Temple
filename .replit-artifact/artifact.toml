kind = "web"
previewPath = "/"
title = "Temple Website"
version = "1.0.0"
id = "artifacts/temple-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18772

[services.development]
run = "pnpm --filter @workspace/temple-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/temple-website", "run", "build" ]
publicDir = "artifacts/temple-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18772"
BASE_PATH = "/"
